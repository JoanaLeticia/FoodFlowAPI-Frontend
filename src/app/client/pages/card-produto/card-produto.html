<div class="prato-cardapio" [class.card-bloqueado]="isIncompativel()">
  <img [src]="itemCardapio.urlImagem" [alt]="itemCardapio.nome" />

  <div class="texto-prato">
    <div class="nome-prato">{{ itemCardapio.nome }}</div>

    <div class="linha-decorativa"></div>

    <div class="preco-container">
      <p *ngIf="itemCardapio.isSugestaoChefe" class="valor-prato-original">
        {{ itemCardapio.precoBase | currency:'R$' }}
      </p>

      <p class="valor-prato">
        {{ (itemCardapio.isSugestaoChefe ? itemCardapio.precoComDesconto :
        itemCardapio.precoBase) | currency:'R$' }}
      </p>
    </div>

    <button
      class="btn-addcarrinho-cardapio"
      (click)="onAdicionar($event)"
      [disabled]="isIncompativel()"
      [title]="isIncompativel() ? 'Este item pertence a um período diferente do seu carrinho' : ''"
    >
      <i
        class="fa-solid"
        [ngClass]="isIncompativel() ? 'fa-lock' : 'fa-cart-shopping'"
      ></i>
      {{ isIncompativel() ? 'Indisponível' : 'Adicionar ao Carrinho' }}
    </button>
  </div>
</div>
